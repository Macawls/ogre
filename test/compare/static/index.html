<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--surface:#f7f7f7;--border:#e5e5e5;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--blue:#2563eb;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;overflow:hidden}

.app{display:grid;grid-template-columns:220px 1fr;height:100vh}

.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.sidebar-top{padding:16px 14px;border-bottom:1px solid var(--border)}
.sidebar-top h1{font-size:13px;font-weight:600;color:var(--text)}
.sidebar-top p{font-size:11px;color:var(--text3);margin-top:2px}
.fixture-list{flex:1;overflow-y:auto;padding:4px 6px}
.fixture-list::-webkit-scrollbar{width:3px}
.fixture-list::-webkit-scrollbar-thumb{background:var(--border)}
.fx{
  display:block;width:100%;text-align:left;padding:5px 10px;
  background:none;border:none;color:var(--text2);font:inherit;font-size:13px;
  cursor:pointer;border-radius:4px;
}
.fx:hover{background:var(--border);color:var(--text)}
.fx.on{background:var(--blue);color:#fff}

.main{display:flex;flex-direction:column;overflow:hidden}

.bar{display:flex;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.bar-name{font-size:14px;font-weight:600;margin-right:auto}
.pill{
  padding:4px 12px;border:1px solid var(--border);border-radius:4px;
  background:none;color:var(--text2);font:inherit;font-size:12px;cursor:pointer;
}
.pill:hover{background:var(--surface);color:var(--text)}
.pill.on{background:var(--text);color:#fff;border-color:var(--text)}

.view{flex:1;overflow-y:auto;padding:24px}
.view::-webkit-scrollbar{width:4px}
.view::-webkit-scrollbar-thumb{background:var(--border)}

.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3)}

.loading{display:flex;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text2)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:s .5s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

/* source */
.src-wrap{margin-bottom:20px}
.src-toggle{font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;font:inherit;padding:4px 0}
.src-toggle:hover{color:var(--text)}
.src-block{
  margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:14px 16px;font-family:'SF Mono',SFMono-Regular,ui-monospace,Menlo,Consolas,monospace;
  font-size:12px;color:var(--text2);max-height:200px;overflow:auto;
  white-space:pre-wrap;word-break:break-all;line-height:1.7;
}

/* columns */
.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.col-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;margin-bottom:4px;border-bottom:1px solid var(--border);
}
.col-name{font-size:13px;font-weight:600}
.col-time{font-size:12px;color:var(--text3);font-family:'SF Mono',SFMono-Regular,ui-monospace,monospace}
.col-img{
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
  cursor:pointer;aspect-ratio:1200/630;background:var(--surface);
}
.col-img img{width:100%;height:100%;object-fit:contain;display:block}
.col-img:hover{box-shadow:0 0 0 2px var(--blue)}
.col-err{
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1200/630;border:1px solid var(--border);border-radius:6px;
  color:var(--red);font-size:12px;padding:16px;text-align:center;
  word-break:break-all;background:var(--surface);
}

/* diff */
.diffs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
.diff-card{border:1px solid var(--border);border-radius:6px;padding:12px}
.diff-label{font-size:12px;color:var(--text3);margin-bottom:4px}
.diff-val{font-size:18px;font-weight:600}
.diff-val.hi{color:var(--green)}.diff-val.md{color:var(--amber)}.diff-val.lo{color:var(--red)}
.diff-heat{width:100%;border-radius:4px;margin-top:8px;aspect-ratio:1200/630;object-fit:contain;background:#111;cursor:pointer}

/* lightbox */
.lb{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;cursor:pointer}
.lb.open{display:flex}
.lb img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:6px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <h1>Compare</h1>
      <p>Ogre vs Satori vs Takumi</p>
    </div>
    <div class="fixture-list" id="list"></div>
  </div>
  <div class="main">
    <div class="bar">
      <div class="bar-name" id="name">Select a fixture</div>
      <button class="pill" id="b-diff" onclick="tDiff()">Diff</button>
    </div>
    <div class="view" id="view"><div class="empty">Select a fixture from the sidebar</div></div>
  </div>
</div>
<div class="lb" id="lb" onclick="this.classList.remove('open')"><img id="lb-img"/></div>
<script>
let cur=null,data=null,diff=null,html=null,sDiff=false,srcOpen=false;

(async()=>{
  const r=await fetch('/api/fixtures');
  const fx=await r.json();
  const el=document.getElementById('list');
  fx.forEach(n=>{
    const b=document.createElement('button');
    b.className='fx';b.textContent=n;
    b.onclick=()=>sel(n);
    el.appendChild(b);
  });
})();

async function sel(n){
  cur=n;data=null;diff=null;sDiff=false;srcOpen=false;
  document.getElementById('b-diff').classList.remove('on');
  document.querySelectorAll('.fx').forEach(b=>b.classList.toggle('on',b.textContent===n));
  document.getElementById('name').textContent=n;
  document.getElementById('view').innerHTML='<div class="loading"><div class="spin"></div>Rendering across all three engines\u2026</div>';
  const hr=await fetch('/api/fixture-html/'+n);
  html=await hr.text();
  const rr=await fetch('/api/render/'+n,{method:'POST'});
  data=await rr.json();
  draw();
}

function draw(){
  if(!data)return;
  const v=document.getElementById('view');
  let h='';

  // source (progressive disclosure)
  h+='<div class="src-wrap">';
  h+='<button class="src-toggle" onclick="srcOpen=!srcOpen;draw()">'+(srcOpen?'\u25BC':'\u25B6')+' HTML source</button>';
  if(srcOpen) h+='<pre class="src-block">'+esc(html.trim())+'</pre>';
  h+='</div>';

  // columns — PNG focused
  h+='<div class="cols">';
  [{k:'ogre',l:'Ogre'},{k:'satori',l:'Satori'},{k:'takumi',l:'Takumi'}].forEach(e=>{
    const d=data[e.k];
    h+='<div>';
    h+='<div class="col-head"><span class="col-name">'+e.l+'</span>';
    if(d&&d.ms!==undefined)h+='<span class="col-time">'+d.ms.toFixed(1)+' ms</span>';
    h+='</div>';
    if(d&&d.error)h+='<div class="col-err">'+esc(d.error)+'</div>';
    else if(d&&d.png)h+='<div class="col-img" onclick="zoom(\'data:image/png;base64,'+d.png+'\')"><img src="data:image/png;base64,'+d.png+'"/></div>';
    else h+='<div class="col-err">No output</div>';
    h+='</div>';
  });
  h+='</div>';

  // diff
  if(sDiff&&diff){
    h+='<div class="diffs">';
    diff.forEach(d=>{
      h+='<div class="diff-card"><div class="diff-label">'+d.label+'</div>';
      if(d.error)h+='<div class="diff-val lo">Error</div><div style="font-size:11px;color:var(--text3)">'+esc(d.error)+'</div>';
      else if(d.diff){
        const p=d.diff.matchPct,c=p>=95?'hi':p>=80?'md':'lo';
        h+='<div class="diff-val '+c+'">'+p.toFixed(1)+'%</div>';
        if(d.diff.heatmap)h+='<img class="diff-heat" src="data:image/png;base64,'+d.diff.heatmap+'" onclick="event.stopPropagation();zoom(\'data:image/png;base64,'+d.diff.heatmap+'\')"/>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  v.innerHTML=h;
}

async function tDiff(){
  sDiff=!sDiff;
  document.getElementById('b-diff').classList.toggle('on',sDiff);
  if(sDiff&&!diff&&cur){
    const r=await fetch('/api/diff/'+cur,{method:'POST'});
    diff=await r.json();
  }
  draw();
}
function zoom(s){document.getElementById('lb-img').src=s;document.getElementById('lb').classList.add('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('open');});
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
