<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ogre Compare</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#252533;
  --text:#e2e2ea;--text2:#8888a0;--text3:#55556a;
  --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --radius:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden}

.app{display:grid;grid-template-columns:240px 1fr;height:100vh}

/* ── Sidebar ── */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-header{
  padding:20px 16px 12px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--text2);letter-spacing:2px;text-transform:uppercase;
}
.sidebar-header span{color:var(--accent2);font-size:13px;letter-spacing:0;text-transform:none;display:block;margin-top:4px;font-weight:500}
.fixture-list{flex:1;overflow-y:auto;padding:8px}
.fixture-list::-webkit-scrollbar{width:4px}
.fixture-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.fixture-btn{
  display:block;width:100%;text-align:left;padding:8px 12px;margin-bottom:2px;
  background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:12px;
  border-radius:var(--radius);cursor:pointer;transition:all .15s;
}
.fixture-btn:hover{background:var(--surface2);color:var(--text)}
.fixture-btn.active{background:var(--accent);color:#fff}

/* ── Main ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.toolbar{
  display:flex;align-items:center;gap:8px;padding:12px 20px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;
}
.toolbar-title{font-family:var(--mono);font-size:13px;color:var(--text2);margin-right:auto}
.toolbar-title b{color:var(--text);font-weight:600}
.toggle-btn{
  padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);
  background:none;color:var(--text2);font-family:var(--mono);font-size:11px;
  cursor:pointer;transition:all .15s;
}
.toggle-btn:hover{border-color:var(--text3);color:var(--text)}
.toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Empty state ── */
.empty{
  display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--text3);font-family:var(--mono);font-size:13px;
}

/* ── Loading ── */
.loading{
  display:flex;align-items:center;justify-content:center;height:100%;gap:12px;
  color:var(--text2);font-family:var(--mono);font-size:13px;
}
.spinner{
  width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Render grid ── */
.render-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.render-col{display:flex;flex-direction:column;gap:8px}
.render-header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:8px 12px;background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);
}
.render-name{font-family:var(--mono);font-size:13px;font-weight:600}
.render-name.ogre{color:var(--green)}
.render-name.satori{color:var(--accent2)}
.render-name.takumi{color:var(--amber)}
.render-time{font-family:var(--mono);font-size:11px;color:var(--text3)}
.render-img-wrap{
  position:relative;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  aspect-ratio:1200/630;
}
.render-img-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.render-error{
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1200/630;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--red);font-family:var(--mono);font-size:11px;
  padding:20px;text-align:center;word-break:break-all;
}

/* ── Diff section ── */
.diff-section{margin-top:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.diff-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;display:flex;flex-direction:column;gap:8px;
}
.diff-label{font-family:var(--mono);font-size:12px;color:var(--text2)}
.diff-pct{font-family:var(--mono);font-size:20px;font-weight:600}
.diff-pct.high{color:var(--green)}
.diff-pct.mid{color:var(--amber)}
.diff-pct.low{color:var(--red)}
.diff-heatmap{width:100%;border-radius:4px;aspect-ratio:1200/630;object-fit:contain;background:#000}

/* ── Source section ── */
.source-section{margin-top:20px}
.source-pre{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;font-family:var(--mono);font-size:12px;color:var(--text2);
  overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;
}

/* ── SVG section ── */
.svg-section{margin-top:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.svg-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;
}
.svg-card-label{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:8px}
.svg-card pre{
  font-family:var(--mono);font-size:10px;color:var(--text2);
  max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;
}

/* ── Lightbox ── */
.lightbox{
  position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);
  display:none;align-items:center;justify-content:center;cursor:pointer;
}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--radius)}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      Fixtures
      <span>Ogre · Satori · Takumi</span>
    </div>
    <div class="fixture-list" id="fixture-list"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">Select a fixture</div>
      <button class="toggle-btn" id="btn-source" onclick="toggleSource()">Source</button>
      <button class="toggle-btn" id="btn-svg" onclick="toggleSvg()">SVG</button>
      <button class="toggle-btn" id="btn-diff" onclick="toggleDiff()">Diff</button>
    </div>
    <div class="content" id="content">
      <div class="empty">Select a fixture from the sidebar</div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" />
</div>

<script>
let currentFixture = null;
let currentData = null;
let currentDiff = null;
let currentHTML = null;
let showSource = false, showSvg = false, showDiff = false;

async function init() {
  const res = await fetch('/api/fixtures');
  const fixtures = await res.json();
  const list = document.getElementById('fixture-list');
  fixtures.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'fixture-btn';
    btn.textContent = name;
    btn.onclick = () => selectFixture(name);
    list.appendChild(btn);
  });
}

async function selectFixture(name) {
  currentFixture = name;
  currentData = null;
  currentDiff = null;
  showDiff = false;
  document.getElementById('btn-diff').classList.remove('on');

  document.querySelectorAll('.fixture-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  document.getElementById('toolbar-title').innerHTML = '<b>' + name + '</b>';
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Rendering across all three engines\u2026</div>';

  const htmlRes = await fetch('../fixtures/' + name + '.html');
  currentHTML = await htmlRes.text();

  const res = await fetch('/api/render/' + name, { method: 'POST' });
  currentData = await res.json();

  render();
}

function render() {
  if (!currentData) return;
  const c = document.getElementById('content');
  let html = '<div class="render-grid">';

  ['ogre', 'satori', 'takumi'].forEach(engine => {
    const d = currentData[engine];
    html += '<div class="render-col">';
    html += '<div class="render-header">';
    html += '<div class="render-name ' + engine + '">' + engine.charAt(0).toUpperCase() + engine.slice(1) + '</div>';
    if (d && d.ms !== undefined) html += '<div class="render-time">' + d.ms.toFixed(1) + ' ms</div>';
    html += '</div>';

    if (d && d.error) {
      html += '<div class="render-error">' + esc(d.error) + '</div>';
    } else if (d && d.png) {
      html += '<div class="render-img-wrap" onclick="openLightbox(\'data:image/png;base64,' + d.png + '\')">';
      html += '<img src="data:image/png;base64,' + d.png + '" />';
      html += '</div>';
    } else {
      html += '<div class="render-error">No output</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  if (showSource && currentHTML) {
    html += '<div class="source-section"><pre class="source-pre">' + esc(currentHTML.trim()) + '</pre></div>';
  }

  if (showSvg && currentData) {
    html += '<div class="svg-section">';
    ['ogre', 'satori'].forEach(engine => {
      const d = currentData[engine];
      html += '<div class="svg-card"><div class="svg-card-label">' + engine + ' SVG</div>';
      if (d && d.svg) {
        try { html += '<pre>' + esc(atob(d.svg).substring(0, 3000)) + (atob(d.svg).length > 3000 ? '\n\u2026 truncated' : '') + '</pre>'; }
        catch { html += '<pre>decode error</pre>'; }
      } else {
        html += '<pre>N/A</pre>';
      }
      html += '</div>';
    });
    html += '<div class="svg-card"><div class="svg-card-label">takumi SVG</div><pre>N/A (PNG only)</pre></div>';
    html += '</div>';
  }

  if (showDiff && currentDiff) {
    html += '<div class="diff-section">';
    currentDiff.forEach(d => {
      html += '<div class="diff-card">';
      html += '<div class="diff-label">' + d.label + '</div>';
      if (d.error) {
        html += '<div class="diff-pct low">ERR</div>';
        html += '<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">' + esc(d.error) + '</div>';
      } else if (d.diff) {
        const pct = d.diff.matchPct;
        const cls = pct >= 95 ? 'high' : pct >= 80 ? 'mid' : 'low';
        html += '<div class="diff-pct ' + cls + '">' + pct.toFixed(1) + '% match</div>';
        if (d.diff.heatmap) {
          html += '<img class="diff-heatmap" src="data:image/png;base64,' + d.diff.heatmap + '" onclick="openLightbox(\'data:image/png;base64,' + d.diff.heatmap + '\')" style="cursor:pointer" />';
        }
      }
      html += '</div>';
    });
    html += '</div>';
  }

  c.innerHTML = html;
}

async function toggleDiff() {
  showDiff = !showDiff;
  document.getElementById('btn-diff').classList.toggle('on', showDiff);
  if (showDiff && !currentDiff && currentFixture) {
    const res = await fetch('/api/diff/' + currentFixture, { method: 'POST' });
    currentDiff = await res.json();
  }
  render();
}

function toggleSource() {
  showSource = !showSource;
  document.getElementById('btn-source').classList.toggle('on', showSource);
  render();
}

function toggleSvg() {
  showSvg = !showSvg;
  document.getElementById('btn-svg').classList.toggle('on', showSvg);
  render();
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
